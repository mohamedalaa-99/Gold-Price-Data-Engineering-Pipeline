services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafdrop:
    image: obsidiandynamics/kafdrop
    container_name: kafdrop

    depends_on:
      - kafka

    ports:
      - "9000:9000"

    environment:
      KAFKA_BROKERCONNECT: kafka:9092

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master

    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

    ports:
      - "8080:8080"
      - "7077:7077"

    volumes:
      - ./:/opt/spark/apps

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker

    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077

    depends_on:
      - spark-master

  postgres:
    image: postgres:15
    container_name: airflow-postgres

    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow

    ports:
      - "5433:5432"

    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: airflow-redis

    # لو عندك Redis على جهازك شغال شيل التعليق من السطر ده فقط وغير البورت
    # ports:
    #   - "6380:6379"

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow

    image: apache/airflow:2.10.0

    depends_on:
      - postgres

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --firstname DEPI
      --lastname Project
      --role Admin
      --email admin@test.com
      --password admin
      "

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow

    image: apache/airflow:2.10.0
    container_name: airflow-webserver

    restart: always

    depends_on:
      - postgres
      - airflow-init
      - kafka

    ports:
      - "8088:8080"

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/profiles.yml:/opt/airflow/profiles.yml
      - ./kafka:/opt/airflow/kafka
      - ./pyspark_processing:/opt/airflow/pyspark_processing
      - ./gold_price_dbt:/opt/airflow/gold_price_dbt

    command: webserver

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow

    image: apache/airflow:2.10.0
    container_name: airflow-scheduler

    restart: always

    depends_on:
      - airflow-webserver
      - kafka

    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/profiles.yml:/opt/airflow/profiles.yml
      - ./kafka:/opt/airflow/kafka
      - ./pyspark_processing:/opt/airflow/pyspark_processing
      - ./gold_price_dbt:/opt/airflow/gold_price_dbt

    command: scheduler

volumes:
  postgres-db-volume: